<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenPrompt</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #4ade80; --green-dim: rgba(74,222,128,0.12);
    --green-border: rgba(74,222,128,0.2);
    --bg: #080f0b; --text: #d1fae5; --muted: #6b7280; --amber: #fbbf24;
  }
  html, body { width: 340px; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; }
  .header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--green-border); background: linear-gradient(180deg,rgba(74,222,128,0.06) 0%,transparent 100%); }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 26px; height: 26px; background: linear-gradient(135deg,#166534,#4ade80); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-text { font-family: Georgia,serif; font-size: 16px; font-weight: 700; color: #ecfdf5; }
  .xp-badge { background: var(--green-dim); border: 1px solid var(--green-border); border-radius: 100px; padding: 3px 9px; font-size: 11px; color: var(--green); }
  .streak-bar { padding: 8px 16px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .streak-text { font-size: 11px; color: var(--amber); flex: 1; }
  .streak-dots { display: flex; gap: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .dot.on { background: var(--amber); }
  .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .stat-card { background: var(--green-dim); border: 1px solid var(--green-border); border-radius: 9px; padding: 9px 6px; text-align: center; }
  .stat-val { font-size: 17px; color: var(--green); line-height: 1; margin-bottom: 2px; }
  .stat-unit { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .compare { margin-top: 8px; padding: 8px 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; }
  .compare-label { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .compare-track { height: 5px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; margin-bottom: 4px; }
  .compare-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg,#166534,#4ade80); }
  .compare-fill.mid  { background: linear-gradient(90deg,#d97706,#fbbf24); }
  .compare-fill.high { background: linear-gradient(90deg,#dc2626,#f87171); }
  .compare-desc { font-size: 10px; color: #6ee7b7; }
  .tip-card { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15); border-radius: 9px; padding: 9px 11px; display: flex; gap: 8px; align-items: flex-start; }
  .tip-icon { font-size: 15px; flex-shrink: 0; }
  .tip-text { font-size: 11px; line-height: 1.5; color: #fde68a; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); border-radius: 100px; padding: 3px 8px; font-size: 10px; color: #c4b5fd; }
  .chip.locked { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.07); color: var(--muted); }
  .actions { padding: 10px 16px 12px; }
  .btn-dash { width: 100%; padding: 9px; background: linear-gradient(135deg,#166534,#16a34a); color: #fff; border: none; border-radius: 9px; font-family: 'Courier New',monospace; font-size: 12px; cursor: pointer; }
  .btn-dash:hover { opacity: 0.9; }
  .privacy { padding: 0 16px 12px; }
  .privacy-badge { background: rgba(74,222,128,0.05); border: 1px solid var(--green-border); border-radius: 100px; padding: 4px 10px; font-size: 10px; color: #6ee7b7; display: inline-block; }
  .welcome { padding: 28px 20px; text-align: center; color: var(--muted); line-height: 1.8; font-size: 12px; }
  .welcome strong { color: var(--green); }
</style>
</head>
<body>
<div id="app"></div>
<script src="popup.js"></script>
</body>
</html>
